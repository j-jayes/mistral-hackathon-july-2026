<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/velib-icon.svg" />
    <!-- viewport-fit=cover is required so env(safe-area-inset-*) resolves on notched iPhones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="description" content="Velib Parking Guide - Find the closest Velib station with available parking docks in Paris" />
    <meta name="theme-color" content="#2b8cbe" />

    <!-- Fonts: Lato (body), Noto Serif JP (headings), IBM Plex Mono (numbers) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Lato:ital,wght@0,400;0,700;1,400&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />
    <title>Velib Parking Guide</title>

    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-title" content="Velib Parking Guide" />

    <!-- iOS Splash Screen -->
    <meta name="apple-mobile-web-app-splash-screen-compatible" content="yes" />

    <!-- Fullscreen on iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Disable telephone number detection -->
    <meta name="format-detection" content="telephone=no" />
  </head>
  <body class="min-h-screen bg-gradient-to-br from-[#667eea] to-[#764ba2]">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
