# Single-container setup — same image that runs on Cloud Run.
# The FastAPI backend serves the built React SPA and the API on one origin.
#
#   docker compose up --build      # http://localhost:8080
#
# Put your keys in .env (see .env.example). Missing keys degrade gracefully:
# geocoding falls back to Paris center, Mistral features run in limited mode.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: velib-app:local
    container_name: velib-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - PORT=8080
      - SERVE_FRONTEND=true
      - DEBUG=false
      - ALLOWED_ORIGINS=*
    restart: unless-stopped
